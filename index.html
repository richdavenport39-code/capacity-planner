<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Capacity Planner — Signing in…</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.10.0/lib/msal-browser.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { background: #fff; border-radius: 12px; padding: 40px; text-align: center; max-width: 420px; border: 0.5px solid rgba(0,0,0,0.12); }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #1a1a18; }
  p  { font-size: 14px; color: #6b6b67; line-height: 1.6; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #3266ad; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success { color: #3b6d11; font-weight: 600; }
  .error   { color: #a32d2d; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Completing sign-in…</h2>
  <p id="msg">Please wait while we finish authenticating you. This window will close automatically.</p>
</div>
<script>
// This page exists solely to handle the Microsoft auth redirect.
// MSAL sends the auth code/token here, we process it, then this
// window closes and the local HTML app receives the token.
(async () => {
  try {
    // Check if this is actually an auth redirect (has code or error in URL)
    const params = new URLSearchParams(window.location.search);
    const hash   = window.location.hash;
    const isAuthRedirect = params.has('code') || params.has('error') ||
                           hash.includes('access_token') || hash.includes('code=') ||
                           hash.includes('error=') || sessionStorage.getItem('msal.interaction.status');

    if (!isAuthRedirect && !sessionStorage.length) {
      // Not an auth redirect — show the app info page instead
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = 'Resource Capacity Planner';
      document.getElementById('msg').innerHTML =
        'This page handles Microsoft sign-in for the <strong>Resource Capacity Planner</strong>. ' +
        'To use the planner, open the <code>resource_capacity_planner.html</code> file on your computer.';
      return;
    }

    // Get the stored client ID from the opener window or localStorage
    const clientId = localStorage.getItem('cp-client-id') ||
                     (window.opener && window.opener.localStorage && window.opener.localStorage.getItem('cp-client-id'));

    if (!clientId) {
      throw new Error('Client ID not found. Please reopen the app and try signing in again.');
    }

    const msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId:    clientId,
        authority:   'https://login.microsoftonline.com/common',
        redirectUri: 'https://richdavenport39-code.github.io/capacity-planner/'
      },
      cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true }
    });

    await msalInstance.initialize();
    await msalInstance.handleRedirectPromise();

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').innerHTML = '<span class="success">✓ Signed in successfully</span>';
    document.getElementById('msg').textContent = 'You can close this window and return to the Capacity Planner.';

    // Close popup after short delay if opened as popup
    setTimeout(() => { try { window.close(); } catch(e) {} }, 1500);

  } catch(e) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').innerHTML = '<span class="error">Sign-in error</span>';
    document.getElementById('msg').textContent = e.message + '. Close this window and try again.';
  }
})();
</script>
</body>
</html>
